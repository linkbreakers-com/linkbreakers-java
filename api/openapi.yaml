    CreateContactLinkRequest:
      description: Request to create a new contact card link.
      example:
        leadGoalDefinition: Capture contact information for sales outreach
        qrcodeDesignId: a8c5e111-8894-4f8a-b5db-9efe0d12a210
        metadata:
          key: metadata
