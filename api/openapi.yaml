        brandSupportiveness: 0
        leadScore: 1
        analysisText: analysisText
        profileFit: 5
        technologicalAptitude: 7
        createdAt: 2000-01-23T04:56:07.000+00:00
        linkId: 1b9d6bcd-bbfd-4b2d-9b5d-ab8dfbbd4bed
        id: f3fcbabe-1d52-41fb-8a3f-b6ccf7f84c9d
        recurringInterest: 5
        recurringScans: 2
        engagementLevel: 6
        updatedAt: 2000-01-23T04:56:07.000+00:00
        visitorId: 4da3e6a2-2d54-4b0f-9e17-4b6c2af7e9c5
        workspaceId: c0d3cafe-5b1e-4d42-a6fd-0c5f5c3962d0
      properties:
        analysisText:
          title: Narrative explanation generated by the AI model
          type: string
        brandSupportiveness:
          format: int32
          title: "Scaled signal indicating brand sentiment from form responses and\
            \ ratings (0-100, null if not applicable)"
          type: integer
        createdAt:
          format: date-time
          title: When the lead score was computed
          type: string
        engagementLevel:
          format: int32
          title: "Scaled signal indicating engagement effort (steps completed, time\
            \ spent, interactions) (0-100, null if not applicable)"
          type: integer
        id:
          example: f3fcbabe-1d52-41fb-8a3f-b6ccf7f84c9d
          title: Lead score identifier (UUID)
          type: string
        leadScore:
          format: int32
          title: Aggregate score between 0-100 summarizing lead quality
          type: integer
        linkId:
          example: 1b9d6bcd-bbfd-4b2d-9b5d-ab8dfbbd4bed
          title: Link associated with this score (UUID)
          type: string
        profileFit:
          format: int32
          title: "Scaled signal indicating how well visitor matches link's target\
            \ audience (0-100, null if not applicable)"
          type: integer
        recurringInterest:
          format: int32
          title: "Scaled bonus for recurring visits and workflow re-entry (0-100,\
            \ null if not applicable)"
          type: integer
        recurringScans:
          format: int32
          title: Count of previous visits from the same visitor/device on the link
            (null if first visit)
          type: integer
        technologicalAptitude:
          format: int32
          title: "Scaled signal indicating tech comfort level based on device/browser\
            \ modernity (0-100, null if not applicable)"
          type: integer
        updatedAt:
          format: date-time
          title: When the lead score record was last updated
          type: string
        visitorId:
          example: 4da3e6a2-2d54-4b0f-9e17-4b6c2af7e9c5
          title: Visitor associated with this score (UUID)
          type: string
        workspaceId:
          example: c0d3cafe-5b1e-4d42-a6fd-0c5f5c3962d0
          title: Workspace that owns the visitor/link pair (UUID)
          type: string
      title: LeadScore
    LeadScoreBreakdown:
