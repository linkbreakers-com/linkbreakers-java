        waitForQrcode: true
        customDomainId: d290f1ee-6c54-4b01-90e6-d701748f0851
        fallbackDestination: https://company.com/contact
        leadTargetDefinition: Business contacts interested in our services
        shortlink: jane-contact
        tags:
        - tags
        - tags
      properties:
        customDomainId:
          example: d290f1ee-6c54-4b01-90e6-d701748f0851
          title: The ID of the custom domain (UUID)
          type: string
        fallbackDestination:
          description: Optional fallback URL if vCard download fails or is not supported.
          example: https://company.com/contact
          title: The fallback destination URL to use when vCard download fails or
            is not supported
          type: string
        leadGoalDefinition:
          description: |-
            The lead goal definition for the link.
            This is a text field that can be used to describe the lead goal or purpose of the link.
          example: Capture contact information for sales outreach
          type: string
        leadTargetDefinition:
          description: |-
            The lead target definition for the link.
            This is a text field that can be used to describe the target lead criteria for the link.
          example: Business contacts interested in our services
          type: string
        metadata:
          additionalProperties:
            type: string
          description: A map of string key-value pairs. All values must be strings.
            Nested objects or arrays are not supported. Maximum of 50 keys.
        name:
          example: Jane Doe Contact Card
          title: The name of the link
          type: string
        qrcodeDesignId:
          description: |-
            The QR Code design ID (UUID).
            If you include this value, the specified design will be associated to this link only.
            A design can belong to one record at a time (Link or QR Code Template).
            Trying to use a design that's already assigned will cause an error.
          example: a8c5e111-8894-4f8a-b5db-9efe0d12a210
          type: string
        qrcodeTemplateId:
          description: |-
            The ID of the QR Code template (UUID)
            If not given, the default QR Code template will be used to generate the QR Code design.
          example: 0d7f4d9c-1aef-4ed4-821b-321a3f9cba1d
          type: string
        shortlink:
          description: |-
            The shortlink for the link
            If not given, the shortlink will be generated by the system.
          example: jane-contact
          type: string
        tags:
          description: "List of tags to associate with the link. If a tag doesn't\
            \ exist, it will be created."
          items:
            type: string
          type: array
        vcardData:
          allOf:
          - $ref: "#/components/schemas/VCardData"
          description: Contact information for the vCard link. This field is required.
          title: vCard contact information (required)
        waitForQrcode:
          description: "Wait for QR code generation to complete. Note: This makes\
            \ the request slower compared to asynchronous generation."
          example: true
          type: boolean
      required:
      - vcardData
