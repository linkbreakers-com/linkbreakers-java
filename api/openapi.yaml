    WorkflowStep:
      description: |-
        Models a node in the Linkbreakers workflow canvas, defining what should occur after a scan (redirects, gates,
        forms) and how it connects to other steps in the visitor journey.
      example:
        createdAt: 2000-01-23T04:56:07.000+00:00
        linkId: 123e4567-e89b-12d3-a456-426614174000
        payload: ""
        kind: KIND_INTERACTION
        canvasPosition: ""
        childStepIds:
        - childStepIds
        - childStepIds
        id: a5f7b184-9d74-4f2a-9ed9-8f6a98cb12f4
        nodeType: NODE_TYPE_COMPOSITE
        parentStepIds:
        - parentStepIds
        - parentStepIds
        eventAction: EVENT_ACTION_CLIENT_REDIRECT
        updatedAt: 2000-01-23T04:56:07.000+00:00
      externalDocs:
        description: Learn more about workflows in Linkbreakers
        url: https://linkbreakers.com/help/article/whats-a-workflow
      properties:
        canvasPosition:
          allOf:
          - $ref: "#/components/schemas/CanvasPosition"
          title: Canvas position for React Flow visualization
        childStepIds:
          items:
            type: string
          readOnly: true
          title: "Child workflow step IDs (steps that this step can transition to,\
            \ UUID)"
          type: array
        createdAt:
          format: date-time
          readOnly: true
          title: When the workflow step was created
          type: string
        eventAction:
          description: |-
            - EVENT_ACTION_UNSPECIFIED: Event action not specified
             - EVENT_ACTION_CLIENT_REDIRECT: Redirect visitors to a destination URL
             - EVENT_ACTION_LINK_VISIT: Entry step triggered when the link is visited.
             - EVENT_ACTION_PASSWORD_VERIFY: Require visitors to enter a password before proceeding
             - EVENT_ACTION_FORM_SUBMIT: Present a data collection form to visitors
             - EVENT_ACTION_CONTACT_CARD: Generate a vCard (VCF) response with contact information
             - EVENT_ACTION_MULTI_LINK: Present a multi-link page with multiple buttons for different destinations
             - EVENT_ACTION_VISIT_TYPE_CONDITION: Route visitors based on whether it's a first or returning visit
             - EVENT_ACTION_COUNTRY_CONDITION: Route visitors based on their country location
             - EVENT_ACTION_DAY_OF_WEEK_CONDITION: Route visitors based on day of week
             - EVENT_ACTION_TIME_OF_DAY_CONDITION: Route visitors based on time of day
             - EVENT_ACTION_DAY_OF_MONTH_CONDITION: Route visitors based on day of month
             - EVENT_ACTION_SPECIFIC_DATE_CONDITION: Route visitors based on specific calendar dates
             - EVENT_ACTION_SOCIAL_LINKS_PAGE: Display a social links page (like Linktree)
             - EVENT_ACTION_DEVICE_TYPE_CONDITION: Route visitors based on device type (e.g. MOBILE, DESKTOP, TABLET)
             - EVENT_ACTION_DEVICE_PLATFORM_CONDITION: Route visitors based on device platform / operating system (e.g. iOS, Android, macOS)
             - EVENT_ACTION_DEVICE_BROWSER_CONDITION: Route visitors based on browser family (e.g. Chrome, Safari, Firefox)
             - EVENT_ACTION_DEVICE_BRAND_CONDITION: Route visitors based on hardware brand (e.g. Apple, Samsung, Google)
             - EVENT_ACTION_DEVICE_ACTOR_CONDITION: Route visitors based on actor classification (e.g. HUMAN, BOT, AGENT)
             - EVENT_ACTION_VISITOR_DATA_CONDITION: Route visitors based on their profile data or custom attributes
          enum:
          - EVENT_ACTION_UNSPECIFIED
          - EVENT_ACTION_CLIENT_REDIRECT
          - EVENT_ACTION_LINK_VISIT
          - EVENT_ACTION_PASSWORD_VERIFY
          - EVENT_ACTION_FORM_SUBMIT
          - EVENT_ACTION_CONTACT_CARD
          - EVENT_ACTION_MULTI_LINK
          - EVENT_ACTION_VISIT_TYPE_CONDITION
          - EVENT_ACTION_COUNTRY_CONDITION
          - EVENT_ACTION_DAY_OF_WEEK_CONDITION
          - EVENT_ACTION_TIME_OF_DAY_CONDITION
          - EVENT_ACTION_DAY_OF_MONTH_CONDITION
          - EVENT_ACTION_SPECIFIC_DATE_CONDITION
          - EVENT_ACTION_SOCIAL_LINKS_PAGE
          - EVENT_ACTION_DEVICE_TYPE_CONDITION
          - EVENT_ACTION_DEVICE_PLATFORM_CONDITION
          - EVENT_ACTION_DEVICE_BROWSER_CONDITION
          - EVENT_ACTION_DEVICE_BRAND_CONDITION
          - EVENT_ACTION_DEVICE_ACTOR_CONDITION
          - EVENT_ACTION_VISITOR_DATA_CONDITION
          example: EVENT_ACTION_CLIENT_REDIRECT
          title: The event action type for this workflow step
          type: string
        id:
          example: a5f7b184-9d74-4f2a-9ed9-8f6a98cb12f4
          title: The unique identifier of the workflow step (UUID)
          type: string
        kind:
          description: |-
            - KIND_UNSPECIFIED: Workflow step kind not specified
             - KIND_ENTRY: Entry steps are automatically triggered when a visitor reaches the workflow
             - KIND_EXIT: Exit steps finalize the workflow (commonly a redirect)
             - KIND_INTERACTION: Interaction steps require visitor input (forms, passwords, etc.)
             - KIND_CONDITION: Condition steps evaluate logic and route to different next steps
          enum:
          - KIND_UNSPECIFIED
          - KIND_ENTRY
          - KIND_EXIT
          - KIND_INTERACTION
          - KIND_CONDITION
          example: KIND_INTERACTION
          readOnly: true
          title: "The kind of workflow step (entry, exit, etc.) - read-only, determined\
            \ by server"
          type: string
        linkId:
          example: 123e4567-e89b-12d3-a456-426614174000
          title: The link ID this workflow step belongs to (UUID)
          type: string
        nodeType:
          allOf:
          - $ref: "#/components/schemas/WorkflowStepNodeType"
          description: |-
            This field determines connection behavior:
            - COMPOSITE nodes (forms, multi-links, conditions): Cannot have direct child connections.
              They manage routing through their payload structure instead.
            - ATOMIC nodes (redirects, passwords, etc.): Can have direct child connections.

            See WorkflowStepNodeType enum for detailed documentation.
          example: NODE_TYPE_COMPOSITE
          readOnly: true
          title: "The node type of workflow step (composite, atomic) - read-only,\
            \ determined by server"
        parentStepIds:
          items:
            type: string
          readOnly: true
          title: "Parent workflow step IDs (steps that can transition into this step,\
            \ UUID)"
          type: array
        payload:
          allOf:
          - $ref: "#/components/schemas/WorkflowStepPayload"
          title: The payload data for this workflow step (varies by event action)
        updatedAt:
          format: date-time
          readOnly: true
          title: When the workflow step was last updated
          type: string
      title: WorkflowStep
    WorkflowStepKind:
      default: KIND_UNSPECIFIED
      description: |-
        - KIND_UNSPECIFIED: Workflow step kind not specified
         - KIND_ENTRY: Entry steps are automatically triggered when a visitor reaches the workflow
         - KIND_EXIT: Exit steps finalize the workflow (commonly a redirect)
         - KIND_INTERACTION: Interaction steps require visitor input (forms, passwords, etc.)
         - KIND_CONDITION: Condition steps evaluate logic and route to different next steps
      enum:
      - KIND_UNSPECIFIED
      - KIND_ENTRY
      - KIND_EXIT
      - KIND_INTERACTION
      - KIND_CONDITION
      title: Workflow step kinds
      type: string
    WorkflowStepNodeType:
      default: NODE_TYPE_UNSPECIFIED
      description: |-
        Node types define how workflow steps manage their outbound connections:

        COMPOSITE nodes manage their own exit paths through their payload structure.
        They have multiple possible next steps defined within the payload itself:
        - Forms: Can have skip and submit paths
        - Multi-links: Each button has its own next_step_id
        - Conditions: Each condition outcome routes to a different next_step_id

        ATOMIC nodes are simple steps with a single, direct connection to the next step.
        They use the standard parent-child relationship mechanism.

        Connection Rules:
        - ✅ Connections TO any node type are allowed
        - ✅ Connections FROM atomic nodes are allowed
        - ❌ Direct connections FROM composite nodes are NOT allowed
          (They manage routing through their payload instead)

        Example: A multi-link node with 3 buttons defines 3 possible next steps in its
        payload.buttons[].next_step_id fields, not through direct parent-child relationships.

         - NODE_TYPE_UNSPECIFIED: Workflow step node type not specified
         - NODE_TYPE_COMPOSITE: Composite nodes manage multiple exit paths through their payload structure.
        Examples: FORM_SUBMIT, MULTI_LINK, VISIT_TYPE_CONDITION, COUNTRY_CONDITION,
        DAY_OF_WEEK_CONDITION, TIME_OF_DAY_CONDITION, DAY_OF_MONTH_CONDITION, SPECIFIC_DATE_CONDITION

        Connection behavior: Cannot create direct parent-child connections FROM these nodes.
        They define their next steps within the payload (e.g., button.next_step_id, option.next_step_id).
         - NODE_TYPE_ATOMIC: Atomic nodes are simple steps with no internal routing logic.
        Examples: LINK_VISIT, CLIENT_REDIRECT, PASSWORD_VERIFY, CONTACT_CARD

        Connection behavior: Can create standard parent-child connections to any other node.
      enum:
      - NODE_TYPE_UNSPECIFIED
      - NODE_TYPE_COMPOSITE
      - NODE_TYPE_ATOMIC
      title: Workflow step node types
      type: string
    WorkflowStepPayload:
      properties:
        clientRedirect:
          $ref: "#/components/schemas/ClientRedirectPayload"
        countryCondition:
