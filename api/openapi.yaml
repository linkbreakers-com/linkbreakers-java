    Media:
      description: |-
        Stores workspace-managed assets such as QR center logos or downloadable files that Linkbreakers signs and serves
        alongside link experiences.
      example:
        createdAt: 2000-01-23T04:56:07.000+00:00
        fileName: fileName
        size: size
        visibility: VISIBILITY_PRIVATE
        mediaType: TYPE_CENTRAL_QRCODE_IMAGE
        id: 5f1c2d3e-4b5a-6c7d-8e9f-0a1b2c3d4e5f
        mimeType: mimeType
        signedUrl: signedUrl
        uploadedBy: uploadedBy
        updatedAt: 2000-01-23T04:56:07.000+00:00
        workspaceId: c0d3cafe-5b1e-4d42-a6fd-0c5f5c3962d0
      externalDocs:
        description: Learn more about media files in Linkbreakers
        url: https://linkbreakers.com/help/article/whats-a-media
      properties:
        createdAt:
          format: date-time
          readOnly: true
          title: When the file was created
          type: string
        fileName:
          title: The name of the file
          type: string
        id:
          example: 5f1c2d3e-4b5a-6c7d-8e9f-0a1b2c3d4e5f
          title: The unique identifier of the media file (UUID)
          type: string
        mediaType:
          allOf:
          - $ref: "#/components/schemas/MediaType"
          description: "Supports CENTRAL_QRCODE_IMAGE (center logo for QR codes),\
            \ BACKGROUND_COVER (background cover for page themes), and BADGE (badge\
            \ image for page themes)"
          example: TYPE_CENTRAL_QRCODE_IMAGE
          title: The type of media
        mimeType:
          readOnly: true
          title: The MIME type of the file
          type: string
        signedUrl:
          title: Short-lived signed URL for downloading the media asset
          type: string
        size:
          format: int64
          readOnly: true
          title: The size of the file in bytes
          type: string
        updatedAt:
          format: date-time
          readOnly: true
          title: When the file was last updated
          type: string
        uploadedBy:
          description: |-
            The member who uploaded the file
            If it was uploaded through the public API, or if the member was removed from the workspace, the uploaded_by will be null.
          readOnly: true
          type: string
        visibility:
          allOf:
          - $ref: "#/components/schemas/MediaVisibility"
          description: "If not provided, the media file will be private to the workspace."
          example: VISIBILITY_PRIVATE
          title: The visibility of the media
        workspaceId:
          example: c0d3cafe-5b1e-4d42-a6fd-0c5f5c3962d0
          title: The workspace ID the media file belongs to (UUID)
          type: string
      title: Media
    MediaSelection:
      properties:
        delete:
          properties: {}
          type: object
        id:
          type: string
    MediaType:
      default: TYPE_UNSPECIFIED
      description: |-
        - TYPE_UNSPECIFIED: The media type is not specified
         - TYPE_CENTRAL_QRCODE_IMAGE: The media type is a central QR code image
         - TYPE_BACKGROUND_COVER: The media type is a background cover for page themes
         - TYPE_BADGE: The media type is a badge image for page themes
      enum:
      - TYPE_UNSPECIFIED
      - TYPE_CENTRAL_QRCODE_IMAGE
      - TYPE_BACKGROUND_COVER
      - TYPE_BADGE
      title: MediaType represents the type of media
      type: string
    MediaVisibility:
      default: VISIBILITY_UNSPECIFIED
      description: |-
        - VISIBILITY_UNSPECIFIED: Media visibility not specified
        The media visibility is not specified
         - VISIBILITY_PUBLIC: The media visibility is public
