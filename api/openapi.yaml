    Device:
      description: |-
        Tracks the fingerprint of a visitor's hardware/software so Linkbreakers can de-duplicate scans, enrich analytics,
        and power security heuristics.
      example:
        country: US
        screenWidth: 1728
        city: New York
        timezone: Europe/London
        isp: Comcast Cable Communications
        networkConnection: 4g
        deviceName: iPhone 14 Pro
        screenRatio: 1.55
        createdAt: 2000-01-23T04:56:07.000+00:00
        deviceActorName: GPTBot
        browserVersion: 99.0.4844.51
        platformVersion: 10.15.7
        browserName: Chrome
        networkRtt: 50
        id: 6f1b2e90-1234-4c8f-91e1-63cd927bf908
        state: NY
        platformName: macOS
        networkBandwidth: 10
        updatedAt: 2000-01-23T04:56:07.000+00:00
        deviceType: DEVICE_TYPE_MOBILE
        browserLanguage: "en-US,en;q=0.9"
        deviceActor: DEVICE_ACTOR_HUMAN
        screenHeight: 1117
        deviceActorOrigin: OpenAI
        ipAddress: 203.0.113.42
        userAgent: "Mozilla/5.0 (iPhone; CPU iPhone OS 16_4 like Mac OS X) AppleWebKit/605.1.15\
          \ (KHTML, like Gecko) Version/16.4 Mobile/15E148 Safari/604.1"
        deviceMemory: 6
        gpu: Apple GPU
        touchScreen: true
        lastUsedAt: 2000-01-23T04:56:07.000+00:00
        deviceConcurrency: 4
        region: CRF
        asn: 7922
        deviceBrand: Apple
      properties:
        asn:
          example: 7922
          format: int64
          title: Autonomous System Number (ASN) - unique identifier for the network
            routing entity
          type: integer
        browserLanguage:
          example: "en-US,en;q=0.9"
          title: Preferred language/locale from the browser (BCP-47)
          type: string
        browserName:
          example: Chrome
          title: "Browser family (e.g. \"Safari\", \"Chrome\")"
          type: string
        browserVersion:
          example: 99.0.4844.51
          title: Browser version string
          type: string
        city:
          example: New York
          title: City derived from IP geolocation
          type: string
        country:
          example: US
          title: Country inferred from IP geolocation (ISO 3166-1 alpha-2)
          type: string
        createdAt:
          format: date-time
          title: Timestamp when the device fingerprint was first seen
          type: string
        deviceActor:
          description: |-
            DeviceActor represents WHO or WHAT is operating the device.
            This distinguishes between a real human visitor, an automated crawler/scraper bot
            (e.g. Googlebot, BingBot), and an AI/LLM agent acting on behalf of a user
            (e.g. GPTBot, ClaudeBot, Gemini, Grok).

             - DEVICE_ACTOR_UNSPECIFIED: Actor not specified or not yet detected
             - DEVICE_ACTOR_HUMAN: Human visitor using a browser (covers MOBILE, TABLET, DESKTOP device types)
             - DEVICE_ACTOR_BOT: Automated crawler or scraper bot (e.g. Googlebot, BingBot, Applebot)
             - DEVICE_ACTOR_AGENT: AI/LLM agent browsing on behalf of a user (e.g. GPTBot, ClaudeBot, Gemini, Grok)
             - DEVICE_ACTOR_UNKNOWN: Unable to classify the actor
          enum:
          - DEVICE_ACTOR_UNSPECIFIED
          - DEVICE_ACTOR_HUMAN
          - DEVICE_ACTOR_BOT
          - DEVICE_ACTOR_AGENT
          - DEVICE_ACTOR_UNKNOWN
          example: DEVICE_ACTOR_HUMAN
          type: string
        deviceActorName:
          description: |-
            Specific actor or crawler name for non-human traffic (e.g. "Googlebot", "GPTBot", "ClaudeBot").
            Only populated when device_actor is BOT or AGENT. Null/empty for HUMAN visitors.
          example: GPTBot
          type: string
        deviceActorOrigin:
          description: |-
            Company or organization behind the actor (e.g. "Google", "OpenAI", "Anthropic").
            Only populated when device_actor is BOT or AGENT. Null/empty for HUMAN visitors.
          example: OpenAI
          type: string
        deviceBrand:
          example: Apple
          title: Hardware brand where available (e.g. "Apple")
          type: string
        deviceConcurrency:
          example: 4
          format: int32
          title: Number of logical CPU cores available to the browser
          type: integer
        deviceMemory:
          example: 6
          format: double
          title: Approximate browser-reported RAM in gigabytes
          type: number
        deviceName:
          example: iPhone 14 Pro
          title: "Marketing name exposed by the browser (e.g. \"iPhone\", \"Pixel\
            \ 7\")"
          type: string
        deviceType:
          description: |-
            DeviceType represents the physical form factor of the device.
            This describes the hardware category (phone, tablet, laptop, etc.),
            NOT who or what is operating it — see DeviceActor for that.

             - DEVICE_TYPE_UNSPECIFIED: Device type not specified or not yet detected
             - DEVICE_TYPE_NATIVE: Native QR scanner (no browser capabilities reported)
             - DEVICE_TYPE_MOBILE: Mobile handset browser
             - DEVICE_TYPE_TABLET: Tablet browser
             - DEVICE_TYPE_DESKTOP: Desktop or laptop browser
             - DEVICE_TYPE_UNKNOWN: Unable to classify the device
          enum:
          - DEVICE_TYPE_UNSPECIFIED
          - DEVICE_TYPE_NATIVE
          - DEVICE_TYPE_MOBILE
          - DEVICE_TYPE_TABLET
          - DEVICE_TYPE_DESKTOP
          - DEVICE_TYPE_UNKNOWN
          example: DEVICE_TYPE_MOBILE
          type: string
        gpu:
          example: Apple GPU
          title: GPU renderer reported by WebGL
          type: string
        id:
          example: 6f1b2e90-1234-4c8f-91e1-63cd927bf908
          title: Unique identifier for the device fingerprint (UUID)
          type: string
        ipAddress:
          example: 203.0.113.42
          title: Last IP address observed for this device (IPv4 or IPv6 format depending
            on availability)
          type: string
        isp:
          example: Comcast Cable Communications
          title: Internet Service Provider (ISP) name or organization from IP geolocation
          type: string
        lastUsedAt:
          format: date-time
          title: Last time this device was associated with an event
          type: string
        networkBandwidth:
          example: 10
          format: double
          title: Estimated downlink bandwidth in megabits/second
          type: number
        networkConnection:
          example: 4g
          title: "Effective network connection type (e.g. \"4g\", \"wifi\")"
          type: string
        networkRtt:
          example: 50
          format: double
          title: Estimated round-trip time in milliseconds
          type: number
        platformName:
          example: macOS
          title: "Operating system family (e.g. \"iOS\", \"Windows\")"
          type: string
        platformVersion:
          example: 10.15.7
          title: Operating system version string
          type: string
        region:
          example: CRF
          title: Region or state from IP geolocation
          type: string
        screenHeight:
          example: 1117
          format: double
          title: Viewport height in CSS pixels
          type: number
        screenRatio:
          example: 1.55
          format: double
          title: Aspect ratio derived from width/height
          type: number
        screenWidth:
          example: 1728
          format: double
          title: Viewport width in CSS pixels
          type: number
        state:
          example: NY
          title: State/Province when available (normalized string)
          type: string
        timezone:
          example: Europe/London
          title: IANA timezone reported by the browser
          type: string
        touchScreen:
          example: true
          title: Whether the device reports touch capabilities
          type: boolean
        updatedAt:
          format: date-time
          title: Timestamp of the latest device metadata update
          type: string
        userAgent:
          example: "Mozilla/5.0 (iPhone; CPU iPhone OS 16_4 like Mac OS X) AppleWebKit/605.1.15\
            \ (KHTML, like Gecko) Version/16.4 Mobile/15E148 Safari/604.1"
          title: Raw user-agent string
          type: string
      title: Device
    DeviceActor:
      default: DEVICE_ACTOR_UNSPECIFIED
      description: |-
        DeviceActor represents WHO or WHAT is operating the device.
        This distinguishes between a real human visitor, an automated crawler/scraper bot
        (e.g. Googlebot, BingBot), and an AI/LLM agent acting on behalf of a user
        (e.g. GPTBot, ClaudeBot, Gemini, Grok).

         - DEVICE_ACTOR_UNSPECIFIED: Actor not specified or not yet detected
         - DEVICE_ACTOR_HUMAN: Human visitor using a browser (covers MOBILE, TABLET, DESKTOP device types)
         - DEVICE_ACTOR_BOT: Automated crawler or scraper bot (e.g. Googlebot, BingBot, Applebot)
         - DEVICE_ACTOR_AGENT: AI/LLM agent browsing on behalf of a user (e.g. GPTBot, ClaudeBot, Gemini, Grok)
         - DEVICE_ACTOR_UNKNOWN: Unable to classify the actor
      enum:
      - DEVICE_ACTOR_UNSPECIFIED
      - DEVICE_ACTOR_HUMAN
      - DEVICE_ACTOR_BOT
      - DEVICE_ACTOR_AGENT
