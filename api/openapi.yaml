    DirectoriesServiceUpdateBody:
      example:
        name: My Updated Directory
        parentDirectoryIdDelete: true
        parentDirectoryId: a1b2c3d4-e5f6-7890-abcd-ef1234567890
      properties:
        name:
          example: My Updated Directory
          title: The new name of the directory
          type: string
        parentDirectoryId:
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
          title: The ID of the parent directory to move this directory under (UUID)
          type: string
        parentDirectoryIdDelete:
          title: |-
            Move the directory to root level by removing its parent
            If true, the parent_directory_id will be set to null
          type: boolean
      title: Request to update a directory
    Directory:
      description: |-
        An organizational bucket that groups links and other directories into a hierarchical folder structure
        within a workspace.
      example:
        createdAt: 2000-01-23T04:56:07.000+00:00
        path: marketing/campaigns/summer-2024
        name: name
        id: d87a9b30-5c8b-4d4e-9fd3-5f5f5f5f5f5f
        parentDirectoryId: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        updatedAt: 2000-01-23T04:56:07.000+00:00
        workspaceId: c0d3cafe-5b1e-4d42-a6fd-0c5f5c3962d0
      externalDocs:
        description: Learn more about directories in Linkbreakers.
        url: https://linkbreakers.com/help/article/what-is-a-directory-in-linkbreakers
      properties:
        createdAt:
          format: date-time
          readOnly: true
          title: When the directory was created
          type: string
        id:
          example: d87a9b30-5c8b-4d4e-9fd3-5f5f5f5f5f5f
          title: The unique identifier of the directory (UUID)
          type: string
        name:
          title: The name of the directory
          type: string
        parentDirectoryId:
          description: |-
            The ID of the parent directory (UUID)
            If not set, the directory is at the root level.
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
          type: string
        path:
          description: "Full hierarchical path separated by slashes, computed server-side"
          example: marketing/campaigns/summer-2024
          readOnly: true
          type: string
        updatedAt:
          format: date-time
          readOnly: true
          title: When the directory was last updated
          type: string
        workspaceId:
          example: c0d3cafe-5b1e-4d42-a6fd-0c5f5c3962d0
          title: The workspace ID the directory belongs to (UUID)
          type: string
      title: Directory
    DotsOptions:
