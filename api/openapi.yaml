        (forms, multi-links, conditions). Composite nodes manage their own routing through
        their payload structure (e.g., button.next_step_id, option.next_step_id).

        Connections TO composite nodes are allowed.
        Only atomic nodes (redirects, passwords, etc.) can use this endpoint as the parent.
