          title: The ID of the child workflow step (UUID)
          type: string
      title: Request to add a relationship between workflow steps
    WorkflowStepsServiceCreateBody:
      example:
        payload: ""
        canvasPosition: ""
        id: 987fcdeb-a321-45e6-b789-123456789012
        eventAction: EVENT_ACTION_FORM_SUBMIT
      properties:
        canvasPosition:
          allOf:
          - $ref: "#/components/schemas/CanvasPosition"
          title: Canvas position for React Flow visualization (optional)
        eventAction:
          description: |-
            - EVENT_ACTION_UNSPECIFIED: Event action not specified
             - EVENT_ACTION_CLIENT_REDIRECT: Redirect visitors to a destination URL
             - EVENT_ACTION_LINK_VISIT: Entry step triggered when the link is visited.
             - EVENT_ACTION_PASSWORD_VERIFY: Require visitors to enter a password before proceeding
             - EVENT_ACTION_FORM_SUBMIT: Present a data collection form to visitors
             - EVENT_ACTION_CONTACT_CARD: Generate a vCard (VCF) response with contact information
             - EVENT_ACTION_MULTI_LINK: Present a multi-link page with multiple buttons for different destinations
             - EVENT_ACTION_VISIT_TYPE_CONDITION: Route visitors based on whether it's a first or returning visit
             - EVENT_ACTION_COUNTRY_CONDITION: Route visitors based on their country location
             - EVENT_ACTION_DAY_OF_WEEK_CONDITION: Route visitors based on day of week
             - EVENT_ACTION_TIME_OF_DAY_CONDITION: Route visitors based on time of day
             - EVENT_ACTION_DAY_OF_MONTH_CONDITION: Route visitors based on day of month
             - EVENT_ACTION_SPECIFIC_DATE_CONDITION: Route visitors based on specific calendar dates
             - EVENT_ACTION_SOCIAL_LINKS_PAGE: Display a social links page (like Linktree)
             - EVENT_ACTION_DEVICE_TYPE_CONDITION: Route visitors based on device type (e.g. MOBILE, DESKTOP, TABLET)
             - EVENT_ACTION_DEVICE_PLATFORM_CONDITION: Route visitors based on device platform / operating system (e.g. iOS, Android, macOS)
             - EVENT_ACTION_DEVICE_BROWSER_CONDITION: Route visitors based on browser family (e.g. Chrome, Safari, Firefox)
             - EVENT_ACTION_DEVICE_BRAND_CONDITION: Route visitors based on hardware brand (e.g. Apple, Samsung, Google)
             - EVENT_ACTION_DEVICE_ACTOR_CONDITION: Route visitors based on actor classification (e.g. HUMAN, BOT, AGENT)
             - EVENT_ACTION_VISITOR_DATA_CONDITION: Route visitors based on their profile data or custom attributes
          enum:
          - EVENT_ACTION_UNSPECIFIED
          - EVENT_ACTION_CLIENT_REDIRECT
          - EVENT_ACTION_LINK_VISIT
          - EVENT_ACTION_PASSWORD_VERIFY
          - EVENT_ACTION_FORM_SUBMIT
          - EVENT_ACTION_CONTACT_CARD
          - EVENT_ACTION_MULTI_LINK
          - EVENT_ACTION_VISIT_TYPE_CONDITION
          - EVENT_ACTION_COUNTRY_CONDITION
          - EVENT_ACTION_DAY_OF_WEEK_CONDITION
          - EVENT_ACTION_TIME_OF_DAY_CONDITION
          - EVENT_ACTION_DAY_OF_MONTH_CONDITION
          - EVENT_ACTION_SPECIFIC_DATE_CONDITION
          - EVENT_ACTION_SOCIAL_LINKS_PAGE
          - EVENT_ACTION_DEVICE_TYPE_CONDITION
          - EVENT_ACTION_DEVICE_PLATFORM_CONDITION
          - EVENT_ACTION_DEVICE_BROWSER_CONDITION
          - EVENT_ACTION_DEVICE_BRAND_CONDITION
          - EVENT_ACTION_DEVICE_ACTOR_CONDITION
          - EVENT_ACTION_VISITOR_DATA_CONDITION
          example: EVENT_ACTION_FORM_SUBMIT
          title: The event action type for this workflow step
          type: string
        id:
          example: 987fcdeb-a321-45e6-b789-123456789012
          title: "Optional ID for the workflow step (UUID; if not provided, will be\
            \ generated by backend)"
          type: string
        payload:
          allOf:
          - $ref: "#/components/schemas/WorkflowStepPayload"
          title: The payload for the workflow step (structure varies by event action)
      title: Request to create a new workflow step
    WorkflowStepsServiceUpdateBody:
      example:
        payload: ""
        canvasPosition: ""
      properties:
        canvasPosition:
          allOf:
          - $ref: "#/components/schemas/CanvasPosition"
          title: The updated canvas position (optional)
        payload:
          allOf:
          - $ref: "#/components/schemas/WorkflowStepPayload"
          title: The updated payload for the workflow step (optional)
      title: Request to update a workflow step
    Workspace:
      description: |-
        Serves as the tenant boundary in Linkbreakers, grouping links, members, settings, billing state,
        and analytics under a single organization's environment.
      example:
        country: country
        website: website
        publishedAt: 2000-01-23T04:56:07.000+00:00
        timezone: timezone
        verifiedAt: 2000-01-23T04:56:07.000+00:00
        description: description
        shortDescription: shortDescription
        tags: tags
        linkSettingId: fbb5c4b6-2a10-4f35-8cb1-60c613a92d2a
        createdAt: 2000-01-23T04:56:07.000+00:00
        enforceMfa: true
        enrollRequestedAt: 2000-01-23T04:56:07.000+00:00
        inactiveSince: 2000-01-23T04:56:07.000+00:00
        subscriptionType: SUBSCRIPTION_TYPE_PRO_PLAN
        faq: faq
        name: name
        id: c0d3cafe-5b1e-4d42-a6fd-0c5f5c3962d0
        slug: slug
        updatedAt: 2000-01-23T04:56:07.000+00:00
      externalDocs:
        description: Learn more about workspaces in Linkbreakers.
        url: https://linkbreakers.com/help/article/what-is-a-workspace
      properties:
        country:
          title: ISO 3166-1 alpha-2 country code inferred from the owner signup or
            link activity
          type: string
        createdAt:
          format: date-time
          title: Timestamp when the workspace record was created
          type: string
        description:
          title: Optional description providing additional context about the workspace
          type: string
        enforceMfa:
          title: Whether members must complete multi-factor authentication at sign
            in
          type: boolean
        enrollRequestedAt:
          format: date-time
          title: Timestamp when enrollment was requested for this workspace
          type: string
        faq:
          description: Frequently Asked Questions about this workspace stored as JSON
          title: FAQ data stored as JSON
          type: string
        id:
          example: c0d3cafe-5b1e-4d42-a6fd-0c5f5c3962d0
          title: Unique identifier for the workspace (UUID)
          type: string
        inactiveSince:
          format: date-time
          title: When the workspace was flagged as inactive due to lack of activity
            (cleared on next sign-in/scan)
          type: string
        linkSettingId:
          example: fbb5c4b6-2a10-4f35-8cb1-60c613a92d2a
          title: Link setting configuration that governs visitor data collection (UUID)
          type: string
        name:
          title: Human-readable display name chosen during signup
          type: string
        publishedAt:
          format: date-time
          title: Timestamp when the workspace was published/made public
          type: string
        shortDescription:
          title: Short description for the workspace
          type: string
        slug:
          title: Unique slug for the workspace (URL-friendly identifier)
          type: string
        subscriptionType:
          description: |-
            - SUBSCRIPTION_TYPE_UNSPECIFIED: Subscription plan not yet assigned
             - SUBSCRIPTION_TYPE_FREE_TRIAL: Workspace is currently in the free trial period
             - SUBSCRIPTION_TYPE_SPONSORED_PRO: Workspace is on the sponsored pro plan with full pro features
             - SUBSCRIPTION_TYPE_PRO_PLAN: Workspace has an active Pro plan subscription
             - SUBSCRIPTION_TYPE_ENTERPRISE_PLAN: Workspace is managed under an Enterprise contract
             - SUBSCRIPTION_TYPE_LIGHT_PLAN: Workspace has an active Light plan subscription
          enum:
          - SUBSCRIPTION_TYPE_UNSPECIFIED
          - SUBSCRIPTION_TYPE_FREE_TRIAL
          - SUBSCRIPTION_TYPE_SPONSORED_PRO
          - SUBSCRIPTION_TYPE_PRO_PLAN
          - SUBSCRIPTION_TYPE_ENTERPRISE_PLAN
          - SUBSCRIPTION_TYPE_LIGHT_PLAN
          example: SUBSCRIPTION_TYPE_PRO_PLAN
          title: Billing plan currently applied to the workspace
          type: string
        tags:
          title: Comma-separated tags for the workspace
          type: string
        timezone:
          title: Default timezone used to render analytics and schedules (IANA name)
          type: string
        updatedAt:
          format: date-time
          title: Timestamp of the last workspace-level update
          type: string
        verifiedAt:
          format: date-time
          title: "Timestamp when the workspace passed verification (e.g., owner email\
            \ confirmed)"
          type: string
        website:
          title: Website URL for the workspace
          type: string
      title: Workspace
    WorkspaceInsight:
      description: |-
        Derived workspace usage insight that helps the UI pre-select the right link type when creating new links.
        Results are cached in Redis and refreshed on every successful link creation.
      example:
        preferredLinkType: ""
      properties:
        preferredLinkType:
          allOf:
          - $ref: "#/components/schemas/PreferredLinkType"
          title: The dominant link type used by the workspace
      title: WorkspaceInsight
    WorkspaceMetric:
      description: Snapshot of high-level counters Linkbreakers surfaces on the dashboard
        so teams can track workspace growth at a glance.
      example:
        totalMembers: 2
        totalEvents: 5
        totalLinks: 5
        totalMonthlyEvents: 7
        tokenCreditsUsed: 6
        totalDirectories: 1
        tokenCreditsLimit: 0
        totalQrcodeTemplates: 9
      properties:
        tokenCreditsLimit:
          format: int32
          title: Platform credits available in the current workspace usage cycle (0
            means unlimited)
          type: integer
        tokenCreditsUsed:
          format: int32
          title: Platform credits consumed in the current workspace usage cycle
          type: integer
        totalDirectories:
          format: int32
          title: Total number of directories (including subdirectories) in the workspace
          type: integer
        totalEvents:
          format: int32
          title: Historical count of events generated by the workspace
          type: integer
        totalLinks:
          format: int32
          title: Number of short links created within the workspace
          type: integer
        totalMembers:
          format: int32
          title: Total number of active members in the workspace
          type: integer
        totalMonthlyEvents:
          format: int32
          title: Events created within the current rolling month window
          type: integer
        totalQrcodeTemplates:
          format: int32
          title: Number of QR code templates owned by the workspace
          type: integer
      title: WorkspaceMetric
    WorkspaceToken:
      description: |-
        Describes a long-lived credential Linkbreakers issues so back-end integrations can call workspace APIs
        without a human session, while keeping auditing metadata for security reviews.
      example:
        createdAt: 2000-01-23T04:56:07.000+00:00
        createdBy: 123e4567-e89b-12d3-a456-426614174000
        lastUsedAt: 2000-01-23T04:56:07.000+00:00
        name: Production token
        id: d22f7bf1-83a9-4f3a-9b37-9a3a21b6ac11
        keyType: ""
        updatedAt: 2000-01-23T04:56:07.000+00:00
        workspaceId: c0d3cafe-5b1e-4d42-a6fd-0c5f5c3962d0
      properties:
        createdAt:
          format: date-time
          readOnly: true
          title: The timestamp when the token was created
          type: string
        createdBy:
          example: 123e4567-e89b-12d3-a456-426614174000
          title: The member who created the token (UUID of creator)
          type: string
        id:
          example: d22f7bf1-83a9-4f3a-9b37-9a3a21b6ac11
          title: The unique identifier of the workspace token (UUID)
          type: string
        keyType:
          allOf:
          - $ref: "#/components/schemas/WorkspaceTokenKeyType"
          readOnly: true
          title: The key type of the token (secret or publishable)
        lastUsedAt:
          format: date-time
          readOnly: true
          title: The timestamp when the token was last used
          type: string
        name:
          example: Production token
          title: The name of the token
          type: string
        updatedAt:
          format: date-time
          readOnly: true
          title: The timestamp when the token was last updated
          type: string
        workspaceId:
          example: c0d3cafe-5b1e-4d42-a6fd-0c5f5c3962d0
          title: The workspace ID the token belongs to (UUID)
          type: string
      title: WorkspaceToken
    WorkspaceTokenKeyType:
      default: WORKSPACE_TOKEN_KEY_TYPE_UNSPECIFIED
      description: |-
        - WORKSPACE_TOKEN_KEY_TYPE_UNSPECIFIED: Default value (should not be used)
         - WORKSPACE_TOKEN_KEY_TYPE_SECRET: Secret key with full API access
         - WORKSPACE_TOKEN_KEY_TYPE_PUBLISHABLE: Publishable key with limited access
      enum:
      - WORKSPACE_TOKEN_KEY_TYPE_UNSPECIFIED
      - WORKSPACE_TOKEN_KEY_TYPE_SECRET
      - WORKSPACE_TOKEN_KEY_TYPE_PUBLISHABLE
      title: WorkspaceTokenKeyType defines the access level of a workspace token
      type: string
    apiTag:
      description: |-
        Provides lightweight segmentation metadata Linkbreakers attaches to links and analytics so teams can group campaigns
        and filter dashboards.
      example:
        createdAt: 2000-01-23T04:56:07.000+00:00
        name: name
        id: d87a9b30-5c8b-4d4e-9fd3-5f5f5f5f5f5f
        updatedAt: 2000-01-23T04:56:07.000+00:00
      externalDocs:
        description: Learn more about tags in Linkbreakers.
        url: https://linkbreakers.com/help/article/what-is-a-tag
      properties:
        createdAt:
          format: date-time
          readOnly: true
          title: When the tag was created
          type: string
        id:
          example: d87a9b30-5c8b-4d4e-9fd3-5f5f5f5f5f5f
          title: The unique identifier of the tag (UUID)
          type: string
        name:
          title: The name of the tag
          type: string
        updatedAt:
          format: date-time
          readOnly: true
          title: When the tag was last updated
          type: string
      title: Tag
    googlerpcStatus:
      properties:
        code:
          format: int32
          type: integer
        details:
          items:
            $ref: "#/components/schemas/protobufAny"
          type: array
        message:
          type: string
    protobufAny:
      additionalProperties: {}
      properties:
        '@type':
          type: string
    protobufNullValue:
      default: NULL_VALUE
      description: |-
        `NullValue` is a singleton enumeration to represent the null value for the
        `Value` type union.

        The JSON representation for `NullValue` is JSON `null`.

         - NULL_VALUE: Null value.
      enum:
      - NULL_VALUE
      type: string
  securitySchemes:
    bearerAuth:
      bearerFormat: JWT
      description: "JWT Bearer token authentication. Use a workspace API token obtained\
        \ from the Linkbreakers dashboard. When using the SDK, pass this token to\
        \ the `accessToken` field in the Configuration constructor (not `apiKey`)."
      scheme: bearer
      type: http

