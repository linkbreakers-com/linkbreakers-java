    Webhook:
      description: |-
        Describes a webhook endpoint that receives event notifications when specified conditions are met,
        providing real-time integration capabilities for external systems.
      example:
        lastSentAt: 2000-01-23T04:56:07.000+00:00
        source: WEBHOOK_SOURCE_LINKBREAKERS
        triggers:
        - KIND_ENTRY
        - KIND_EXIT
        createdAt: 2000-01-23T04:56:07.000+00:00
        linkId: d22f7bf1-83a9-4f3a-9b37-9a3a21b6ac11
        createdBy: 123e4567-e89b-12d3-a456-426614174000
        endpointUrl: https://api.example.com/webhooks/linkbreakers
        lastDeliveredAt: 2000-01-23T04:56:07.000+00:00
        name: Production Event Notifications
        successCount: successCount
        id: d22f7bf1-83a9-4f3a-9b37-9a3a21b6ac11
        failureCount: failureCount
        status: WEBHOOK_STATUS_ACTIVE
        updatedAt: 2000-01-23T04:56:07.000+00:00
        workspaceId: c0d3cafe-5b1e-4d42-a6fd-0c5f5c3962d0
      externalDocs:
        description: Learn more about webhooks in Linkbreakers
        url: https://linkbreakers.com/help/article/how-do-webhooks-work-in-linkbreakers
      properties:
        createdAt:
          format: date-time
          readOnly: true
          title: The timestamp when the webhook was created
          type: string
        createdBy:
          example: 123e4567-e89b-12d3-a456-426614174000
          title: The member who created the webhook (UUID)
          type: string
        endpointUrl:
          example: https://api.example.com/webhooks/linkbreakers
          title: The URL endpoint that will receive webhook POST requests
          type: string
        failureCount:
          format: int64
          readOnly: true
          title: Count of failed webhook deliveries
          type: string
        id:
          example: d22f7bf1-83a9-4f3a-9b37-9a3a21b6ac11
          title: The unique identifier of the webhook (UUID)
          type: string
        lastDeliveredAt:
          description: |-
            The timestamp when the webhook was last successfully delivered to the endpoint.
            This field is only updated when the webhook endpoint responds with a 2xx status code.
            Use this to track actual successful event notifications to external systems.
          format: date-time
          readOnly: true
          type: string
        lastSentAt:
          description: |-
            The timestamp when the webhook was last triggered (attempted), regardless of success or failure.
            This field is updated on every webhook transmission attempt, including failed deliveries.
            Use this to track webhook activity and debugging transmission issues.
          format: date-time
          readOnly: true
          type: string
        linkId:
          description: |-
            Filter webhook notifications by a specific link ID.
            Only events from this link will trigger webhook notifications.
            If empty, all links in the workspace will trigger notifications.
          example: d22f7bf1-83a9-4f3a-9b37-9a3a21b6ac11
          type: string
        name:
          example: Production Event Notifications
          title: The name of the webhook
          type: string
        source:
          allOf:
          - $ref: "#/components/schemas/WebhookSource"
          example: WEBHOOK_SOURCE_LINKBREAKERS
          title: "Source of the webhook - indicates whether it was created manually\
            \ through \nthe dashboard or automatically via an integration platform"
        status:
          allOf:
          - $ref: "#/components/schemas/WebhookStatus"
          example: WEBHOOK_STATUS_ACTIVE
          title: Current status of the webhook
        successCount:
          format: int64
          readOnly: true
          title: Count of successful webhook deliveries
          type: string
        triggers:
          description: |-
            Filter webhook notifications by workflow step kinds.
            Only workflow steps matching these kinds will trigger webhook notifications.
            If empty, all workflow step kinds will trigger notifications.
          example:
          - KIND_ENTRY
          - KIND_EXIT
          items:
            $ref: "#/components/schemas/WorkflowStepKind"
          type: array
        updatedAt:
          format: date-time
          readOnly: true
          title: The timestamp when the webhook was last updated
          type: string
        workspaceId:
          example: c0d3cafe-5b1e-4d42-a6fd-0c5f5c3962d0
          title: The workspace ID the webhook belongs to (UUID)
          type: string
