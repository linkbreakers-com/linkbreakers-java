    EventsMetric:
      description: "Aggregated analytics calculated on demand for time windows, giving\
        \ Linkbreakers UIs headline numbers without exposing raw events."
      example:
        topDeviceType: DEVICE_TYPE_DESKTOP
        lastAt: 2000-01-23T04:56:07.000+00:00
        totalCountries: 1
        totalDeviceTypes: 5
        totalEvents: 5
        firstAt: 2000-01-23T04:56:07.000+00:00
        topCity: topCity
        topCountry: topCountry
        totalCities: 6
        averageLeadScore: 0.8008281904610115
      properties:
        averageLeadScore:
          format: double
          title: Average lead score (excluding null values)
          type: number
        firstAt:
          format: date-time
          title: Timestamp of the first event in the aggregated range
          type: string
        lastAt:
          format: date-time
          title: Timestamp of the last event in the aggregated range
          type: string
        topCity:
          title: The top city
          type: string
        topCountry:
          title: The top country (ISO code or name)
          type: string
        topDeviceType:
          description: |-
            DeviceType represents the physical form factor of the device.
            This describes the hardware category (phone, tablet, laptop, etc.),
            NOT who or what is operating it — see DeviceActor for that.

             - DEVICE_TYPE_UNSPECIFIED: Device type not specified or not yet detected
             - DEVICE_TYPE_NATIVE: Native QR scanner (no browser capabilities reported)
             - DEVICE_TYPE_MOBILE: Mobile handset browser
             - DEVICE_TYPE_TABLET: Tablet browser
             - DEVICE_TYPE_DESKTOP: Desktop or laptop browser
             - DEVICE_TYPE_UNKNOWN: Unable to classify the device
          enum:
          - DEVICE_TYPE_UNSPECIFIED
          - DEVICE_TYPE_NATIVE
          - DEVICE_TYPE_MOBILE
          - DEVICE_TYPE_TABLET
          - DEVICE_TYPE_DESKTOP
          - DEVICE_TYPE_UNKNOWN
          example: DEVICE_TYPE_DESKTOP
          title: The top device type
          type: string
        totalCities:
          format: int32
          title: Total number of unique cities seen in the events
          type: integer
        totalCountries:
          format: int32
          title: Total number of unique countries seen in the events
          type: integer
        totalDeviceTypes:
          format: int32
          title: Number of unique device types
          type: integer
        totalEvents:
          format: int32
          title: Total number of events matching the query window
          type: integer
      title: EventsMetric
