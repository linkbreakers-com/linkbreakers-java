      enum:
      - VISIBILITY_UNSPECIFIED
      - VISIBILITY_PUBLIC
      - VISIBILITY_PRIVATE
      title: Visibility represents the visibility of a media file
      type: string
    Member:
      description: |-
        Describes a teammate invited into a workspace, including their role, login metadata, and last-known activity
        so Linkbreakers can enforce access policies and audit collaboration.
      example:
        lastName: Rivera
        lastKnownTimezone: Europe/London
        role: ROLE_ADMIN
        lastKnownIp: 203.0.113.42
        lastSigninAt: 2000-01-23T04:56:07.000+00:00
        accessToken: lbw_1w8jp9longjwtvalue
        displayLanguage: en-US
        accessRevokedAt: 2000-01-23T04:56:07.000+00:00
        createdAt: 2000-01-23T04:56:07.000+00:00
        firstName: Sam
        id: 123e4567-e89b-12d3-a456-426614174000
        lastKnownLanguage: "en-US,en;q=0.9"
        email: sam.member@example.com
        lastKnownCountry: US
        updatedAt: 2000-01-23T04:56:07.000+00:00
        workspaceId: c0d3cafe-5b1e-4d42-a6fd-0c5f5c3962d0
      properties:
        accessRevokedAt:
          format: date-time
          title: When the member's access was revoked (null means active)
          type: string
        accessToken:
          example: lbw_1w8jp9longjwtvalue
          title: Access token issued during sign-in; returned to clients but not persisted
            on the member record
          type: string
        createdAt:
          format: date-time
          title: Timestamp when the member was created
          type: string
        displayLanguage:
          example: en-US
          title: Preferred language for emails and product copy (BCP-47)
          type: string
        email:
          example: sam.member@example.com
          title: Email address used as the member's login identifier
          type: string
        firstName:
          example: Sam
          title: Member's given name used in UI surfaces and emails
          type: string
        id:
          example: 123e4567-e89b-12d3-a456-426614174000
          title: Unique identifier for the member record (UUID)
          type: string
        lastKnownCountry:
          example: US
          title: Country inferred from geolocation during the most recent sign-in
            (ISO 3166-1 alpha-2)
          type: string
        lastKnownIp:
          example: 203.0.113.42
          title: IP address seen on the most recent sign-in
          type: string
        lastKnownLanguage:
          example: "en-US,en;q=0.9"
          title: Browser language header captured during the most recent sign-in
          type: string
        lastKnownTimezone:
          example: Europe/London
          title: Timezone reported during the most recent sign-in (IANA TZ database)
          type: string
        lastName:
          example: Rivera
          title: Member's family name used in UI surfaces and emails
          type: string
        lastSigninAt:
          format: date-time
          title: Last time the member successfully authenticated
          type: string
        role:
          allOf:
          - $ref: "#/components/schemas/Role"
          example: ROLE_ADMIN
          title: Workspace role that controls product permissions
        updatedAt:
          format: date-time
          title: Timestamp when member metadata was last updated
          type: string
        workspaceId:
          example: c0d3cafe-5b1e-4d42-a6fd-0c5f5c3962d0
          title: Workspace the member belongs to (UUID)
          type: string
      title: Member
