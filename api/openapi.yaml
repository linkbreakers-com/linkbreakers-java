openapi: 3.1.0
info:
  contact:
    name: Linkbreakers Support
    url: https://app.linkbreakers.com
  description: This is a documentation of all the APIs of Linkbreakers
  title: Linkbreakers API
  version: 1.46.10
servers:
- url: https://api.linkbreakers.com
security:
- bearerAuth: []
tags:
- description: "Endpoints for managing custom domains in Linkbreakers. These endpoints\
    \ allow you to register, verify, and manage custom domains for your workspace."
  name: Custom Domains
- description: Endpoints for managing directories in Linkbreakers. Directories let
    you organize links and other directories into a hierarchical folder structure.
  name: Directories
- description: Endpoints for managing events in Linkbreakers. These endpoints allow
    you to collect data and list events.
  name: Events
- description: "Endpoints for managing shortened links in Linkbreakers. These endpoints\
    \ allow you to create, retrieve, list, and delete shortened links for your workspace."
  name: Links
- description: "Endpoints for managing media files in Linkbreakers. These endpoints\
    \ allow you to upload, retrieve, list, and delete media files for your workspace."
  name: Media
- description: "Endpoints for managing members in Linkbreakers. These endpoints allow\
    \ you to invite, retrieve, update, and delete members."
  name: Members
- description: "Endpoints for analyzing workspace activity within Linkbreakers, covering\
    \ rolling event totals, audience reach, and calendar heatmaps."
  name: Workspace Metrics
- description: "Endpoints for managing page visual themes. These endpoints allow you\
    \ to create, read, and update themes for canvas, cover, badge, container, typography,\
    \ and interactive elements."
  name: Page Themes
- description: "Endpoints for managing QR Code Designs in Linkbreakers. These endpoints\
    \ allow you to create, retrieve, update, and delete QR Code Designs."
  name: QR Code Designs
- description: "Endpoints for managing QR Code Templates in Linkbreakers. These endpoints\
    \ allow you to create, retrieve, update, and delete QR Code Templates."
  name: QR Code Templates
- description: Endpoints for managing link-level data collection settings in Linkbreakers.
  name: Link Settings
- description: Endpoints for managing tags in Linkbreakers. These endpoints allow
    you to search for tags in a workspace.
  name: Tags
- description: Endpoints for managing time series in Linkbreakers. These endpoints
    allow you to get events time series.
  name: Times Series
- description: "Identify and manage visitors. Accepts system fields like $email, $phone\
    \ and arbitrary key/value attributes."
  name: Visitors
- description: "Endpoints for managing webhooks in Linkbreakers. These endpoints allow\
    \ you to create, list, and delete webhooks for event notifications."
  name: Webhooks
- description: "Endpoints for managing workflow steps in Linkbreakers. Workflow steps\
    \ define the behavior of links, such as redirection destinations and data collection\
    \ flows."
  name: Workflow Steps
- description: "Endpoints for managing workspace tokens in Linkbreakers. These endpoints\
    \ allow you to create, list, and delete workspace tokens for authentication."
  name: Workspace Tokens
- description: Endpoints for managing workspaces in Linkbreakers. These endpoints
    allow you to update and get workspaces.
  name: Workspaces
paths:
  /v1/custom-domains:
    get:
      description: Retrieves the custom domains for your workspace
      operationId: CustomDomainsService_List
      parameters:
      - description: |-
          Filter by the status of the custom domains to list. Optional.

           - STATUS_UNSPECIFIED: The status is not specified
           - STATUS_INACTIVE: The domain is inactive. It was created but not checked yet.
           - STATUS_DOMAIN_PENDING: The domain is pending. Last time it was checked, it was not pointing to the correct Linkbreakers subdomain.
           - STATUS_VERIFICATION_PENDING: The domain is pending verification. Please verify through TXT record.
           - STATUS_CERTIFICATE_PENDING: The domain is pending certificate. The SSL certificate is not yet ready.
           - STATUS_ACTIVE: The domain is fully active
        explode: true
        in: query
        name: status
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListCustomDomainsResponse"
          description: Everything worked as expected.
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Unexpected error
      security:
      - bearerAuth: []
      summary: List custom domains
      tags:
      - Custom Domains
      x-accepts:
      - application/json
    post:
      description: This endpoint allows users to register a new custom domain that
        can be used with their Linkbreakers workspace.
      operationId: CustomDomainsService_Create
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCustomDomainRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCustomDomainResponse"
          description: Everything worked as expected.
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Unexpected error
      security:
      - bearerAuth: []
      summary: Create a custom domain
      tags:
      - Custom Domains
      x-content-type: application/json
      x-accepts:
      - application/json
  /v1/custom-domains/{id}:
    delete:
      description: Removes a custom domain from the workspace. This operation cannot
        be undone.
      operationId: CustomDomainsService_Delete
      parameters:
      - description: The ID of the custom domain to delete (UUID)
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteCustomDomainResponse"
          description: Everything worked as expected.
        "204":
          content:
            application/json:
              schema: {}
          description: Custom domain deleted successfully
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Unexpected error
      security:
      - bearerAuth: []
      summary: Delete a custom domain
      tags:
      - Custom Domains
      x-accepts:
      - application/json
    get:
      description: Retrieves information about a custom domain including its verification
        status and timestamps.
      operationId: CustomDomainsService_Get
      parameters:
      - description: The ID of the custom domain to retrieve (UUID)
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCustomDomainResponse"
          description: Everything worked as expected.
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Unexpected error
      security:
      - bearerAuth: []
      summary: Get custom domain details
      tags:
      - Custom Domains
      x-accepts:
      - application/json
    patch:
      description: "Update settings for a custom domain, such as the root destination\
        \ URL."
      operationId: CustomDomainsService_Update
      parameters:
      - description: The ID of the custom domain to update (UUID)
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomDomainsServiceUpdateBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateCustomDomainResponse"
          description: Everything worked as expected.
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Unexpected error
      security:
      - bearerAuth: []
      summary: Update a custom domain
      tags:
      - Custom Domains
      x-content-type: application/json
      x-accepts:
      - application/json
  /v1/custom-domains/{id}/check:
    post:
      description: Check a custom domain by looking up its DNS records and TLS status.
        This is automatically done when the domain is created. It will update the
        domain status.
      operationId: CustomDomainsService_Check
      parameters:
      - description: The ID of the custom domain to retrieve (UUID)
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckCustomDomainResponse"
          description: Everything worked as expected.
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Unexpected error
      security:
      - bearerAuth: []
      summary: Check a custom domain
      tags:
      - Custom Domains
      x-accepts:
      - application/json
  /v1/custom-domains/{id}/validation_instructions:
    get:
      description: Get the instructions for validating a custom domain. There may
        be a delay before the instructions are available.
      operationId: CustomDomainsService_ValidationInstructions
      parameters:
      - description: The ID of the custom domain to retrieve (UUID)
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationInstructionsCustomDomainResponse"
          description: Everything worked as expected.
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Unexpected error
      security:
      - bearerAuth: []
      summary: Get the validation instructions
      tags:
      - Custom Domains
      x-accepts:
      - application/json
  /v1/directories:
    get:
      description: "List directories in the workspace with optional filtering by parent\
        \ directory, search, and pagination."
      operationId: DirectoriesService_List
      parameters:
      - description: The maximum number of directories to return
        explode: true
        in: query
        name: pageSize
        required: true
        schema:
          format: int64
          type: integer
        style: form
      - description: |-
          The token for retrieving the next page of results
          If not provided, the first page of results will be returned
        explode: true
        in: query
        name: pageToken
        required: false
        schema:
          type: string
        style: form
      - description: "Filter directories by parent. When empty, returns root-level\
          \ directories."
        explode: true
        in: query
        name: parentDirectoryId
        required: false
        schema:
          type: string
        style: form
      - description: |-
          Search query to filter directories by name

          Search query to filter directories by name
        explode: true
        in: query
        name: search
        required: false
        schema:
          type: string
        style: form
      - description: |-
          When listing with parent_directory_id, also include root-level directories if true

          When listing with parent_directory_id, also include root-level directories.
        explode: true
        in: query
        name: includeRoot
        required: false
        schema:
          type: boolean
        style: form
      - description: |-
          When true, returns all directories recursively regardless of parent filter
          Useful for getting a complete flat list of all directories in the workspace (e.g., for directory pickers)
          When false (default), returns only immediate children based on parent_directory_id

          Return all directories recursively. When true with empty parent_directory_id, returns all directories in workspace. When true with parent_directory_id set, returns all descendants of that directory.
        explode: true
        in: query
        name: recursive
        required: false
        schema:
          type: boolean
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListDirectoriesResponse"
          description: Everything worked as expected.
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Unexpected error
      security:
      - bearerAuth: []
      summary: List directories
      tags:
      - Directories
      x-accepts:
      - application/json
    post:
      description: Create a new directory in the workspace. Optionally nest it under
        an existing directory.
      operationId: DirectoriesService_Create
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDirectoryRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDirectoryResponse"
          description: Everything worked as expected.
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Unexpected error
      security:
      - bearerAuth: []
      summary: Create a directory
      tags:
      - Directories
      x-content-type: application/json
      x-accepts:
      - application/json
  /v1/directories/{id}:
    delete:
      description: Remove a directory from the workspace. This operation cannot be
        undone. A directory cannot be deleted while it still contains links or child
        directories; move or remove them first.
      operationId: DirectoriesService_Delete
      parameters:
      - description: "The ID of the directory to delete. The directory must be empty\
          \ before deletion; if it still contains links or child directories, the\
          \ request fails."
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteDirectoryResponse"
          description: Everything worked as expected.
        "412":
          content:
            application/json:
              schema: {}
          description: Directory cannot be deleted because it still contains links
            or child directories.
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Unexpected error
      security:
      - bearerAuth: []
      summary: Delete a directory
      tags:
      - Directories
      x-accepts:
      - application/json
    get:
      description: Retrieve a directory by its unique identifier.
      operationId: DirectoriesService_Get
      parameters:
      - description: The ID of the directory to retrieve (UUID)
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDirectoryResponse"
          description: Everything worked as expected.
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Unexpected error
      security:
      - bearerAuth: []
      summary: Get a directory
      tags:
      - Directories
      x-accepts:
      - application/json
    patch:
      description: Update a directory's name or move it under a different parent directory.
      operationId: DirectoriesService_Update
      parameters:
      - description: The ID of the directory to update (UUID)
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DirectoriesServiceUpdateBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateDirectoryResponse"
          description: Everything worked as expected.
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Unexpected error
      security:
      - bearerAuth: []
      summary: Update a directory
      tags:
      - Directories
      x-content-type: application/json
      x-accepts:
      - application/json
  /v1/events:
    get:
      description: "Retrieves the workspace's event timeline, returning paginated\
        \ JSON by default or CSV payloads for reporting exports. For workspaces on\
        \ the free plan, events older than 2 weeks are restricted, and for light plan\
        \ workspaces, events older than 3 months are restricted."
      operationId: EventsService_ListEvents
      parameters:
      - description: |-
          Filter events to a specific link (optional, UUID)

          Optional
        explode: true
        in: query
        name: linkId
        required: false
        schema:
          type: string
        style: form
      - description: |-
          Inclusive start timestamp for the query window (workspace timezone aware).
          Note: For free plan workspaces, this will be automatically adjusted to not go back more than 2 weeks.
          For light plan workspaces, this will be automatically adjusted to not go back more than 3 months.
        explode: true
        in: query
        name: startDate
        required: false
        schema:
          format: date-time
          type: string
        style: form
      - description: Inclusive end timestamp for the query window
        explode: true
        in: query
        name: endDate
        required: false
        schema:
          format: date-time
          type: string
        style: form
      - description: |-
          Desired response format (defaults to RESPONSE_FORMAT_JSON; use RESPONSE_FORMAT_CSV for exports)

           - RESPONSE_FORMAT_UNSPECIFIED: Response format not specified
           - RESPONSE_FORMAT_JSON: Response format JSON
           - RESPONSE_FORMAT_CSV: Response format CSV
        explode: true
        in: query
        name: responseFormat
        required: false
        schema:
          type: string
        style: form
      - description: |-
          Maximum number of events to return (default: 100, max: 1000)

          Maximum number of events to return (default: 100, max: 1000)
        explode: true
        in: query
        name: pageSize
        required: false
        schema:
          format: int64
          type: integer
        style: form
      - description: |-
          Cursor token to retrieve the next page of results

          Cursor token to retrieve the next page of results
        explode: true
        in: query
        name: pageToken
        required: false
        schema:
          type: string
        style: form
      - description: |-
          Optional list of relationships to include: visitor, device, link, workspace, leadScore

          Optional list of relationships to include: visitor, device, link, workspace, leadScore
        explode: true
        in: query
        name: include
        required: false
        schema:
          items:
            type: string
          type: array
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListEventsResponse"
          description: Everything worked as expected.
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Unexpected error
      security:
      - bearerAuth: []
      summary: List events
      tags:
      - Events
      x-accepts:
      - application/json
  /v1/events/{eventId}/traces:
    get:
      description: "Retrieves all workflow step traces for an event, ordered by completion\
        \ time. Useful for analyzing user engagement and workflow progression."
      operationId: EventsService_ListEventTraces
      parameters:
      - description: Event ID to get traces for (UUID)
        explode: false
        in: path
        name: eventId
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListEventTracesResponse"
          description: Everything worked as expected.
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Unexpected error
      security:
      - bearerAuth: []
      summary: List event traces
      tags:
      - Events
      x-accepts:
      - application/json
  /v1/integrations/{slug}:
    post:
      operationId: IntegrationsService_Track
      parameters:
      - description: The slug identifying the integration being installed
        explode: false
        in: path
        name: slug
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                properties: {}
                type: object
          description: Everything worked as expected.
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Unexpected error
      security:
      - bearerAuth: []
      summary: Track notifies when an integration installation is attempted
      tags:
      - IntegrationsService
      x-accepts:
      - application/json
  /v1/links:
    get:
      description: Retrieves the shortened links for your workspace
      operationId: LinksService_List
      parameters:
      - description: The maximum number of links to return.
        explode: true
        in: query
        name: pageSize
        required: true
        schema:
          format: int64
          type: integer
        style: form
      - description: |-
          The token for retrieving the next page of results
          If not provided, the first page of results will be returned
        explode: true
        in: query
        name: pageToken
        required: false
        schema:
          type: string
        style: form
      - description: |-
          List of related resources to include in the response.
          Supported values: "customDomain", "qrcodeDesign", "qrcodeSignedUrl", "tags", "pageTheme".
          Use "qrcodeSignedUrl" to fetch signed QR image URLs—they are omitted by default to keep requests fast.
        explode: true
        in: query
        name: include
        required: false
        schema:
          items:
            type: string
          type: array
        style: form
      - description: Tags to filter links by (matches links containing any of the
          provided tags)
        explode: true
        in: query
        name: tags
        required: false
        schema:
          items:
            type: string
          type: array
        style: form
      - description: |-
          Search query to filter links by name or shortlink

          Search query to filter links by name or shortlink
        explode: true
        in: query
        name: search
        required: false
        schema:
          type: string
        style: form
      - description: |-
          Field to sort links by (defaults to updated_at if not specified)

          Field to sort links by

           - LINK_SORT_FIELD_UNSPECIFIED: Sort field not specified (defaults to updated_at)
           - LINK_SORT_FIELD_CREATED_AT: Sort by creation date
           - LINK_SORT_FIELD_UPDATED_AT: Sort by last update date
           - LINK_SORT_FIELD_SHORTLINK: Sort by shortlink name
           - LINK_SORT_FIELD_NAME: Sort by link name
           - LINK_SORT_FIELD_EVENT_COUNT: Sort by event count
        explode: true
        in: query
        name: sortBy
        required: false
        schema:
          type: string
        style: form
      - description: |-
          Sort direction (defaults to descending if not specified)

          Sort direction (ascending or descending)

           - SORT_DIRECTION_UNSPECIFIED: Sort direction not specified (defaults to descending)
           - SORT_DIRECTION_ASC: Sort in ascending order
           - SORT_DIRECTION_DESC: Sort in descending order
        explode: true
        in: query
        name: sortDirection
        required: false
        schema:
          type: string
        style: form
      - description: |-
          View mode. Default returns all links. LINK_VIEW_DIRECTORY scopes to a directory (or root when directory_id is empty).

           - LINK_VIEW_UNSPECIFIED: Return all links regardless of directory (default)
           - LINK_VIEW_DIRECTORY: Return links scoped to a directory.
          When directory_id is set, returns links in that directory.
          When directory_id is empty, returns root-level links (no directory).
        explode: true
        in: query
        name: view
        required: false
        schema:
          type: string
        style: form
      - description: "Directory ID to scope to when view is LINK_VIEW_DIRECTORY. When\
          \ empty with LINK_VIEW_DIRECTORY, returns root-level links."
        explode: true
        in: query
        name: directoryId
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListLinksResponse"
          description: Everything worked as expected.
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Unexpected error
      security:
      - bearerAuth: []
      summary: List links
      tags:
      - Links
      x-accepts:
      - application/json
    post:
      description: |-
        This endpoint allows users to create a new shortened URL link in their Linkbreakers workspace.
        The URL will be checked for malicious content before being shortened.
      operationId: LinksService_Create
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLinkRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateLinkResponse"
          description: Everything worked as expected.
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Unexpected error
      security:
      - bearerAuth: []
      summary: Create a new link
      tags:
      - Links
      x-content-type: application/json
      x-accepts:
      - application/json
  /v1/links/bulk:
    post:
      description: |-
        Creates links in batch using the same per-link options as Create.
        This operation is transactional: if one link fails validation or insertion,
        no links from the batch are created.
      operationId: LinksService_CreateBulk
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBulkLinksRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateBulkLinksResponse"
          description: Everything worked as expected.
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Unexpected error
      security:
      - bearerAuth: []
      summary: Create multiple links in a single request
      tags:
      - Links
      x-content-type: application/json
      x-accepts:
      - application/json
  /v1/links/contact:
    post:
      description: |-
        This endpoint allows users to create a new vCard contact link in their Linkbreakers workspace.
        The link will generate a vCard file for contact information sharing.
