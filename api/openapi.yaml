    CustomDomain:
      description: |-
        Captures a branded hostname that Linkbreakers provisions for a workspace so scans and shortlinks resolve
        under the customer's domain, including verification and certificate lifecycle state.
      example:
        createdAt: 2000-01-23T04:56:07.000+00:00
        lastCheckedAt: 2000-01-23T04:56:07.000+00:00
        rootDestination: https://example.com
        activatedAt: 2000-01-23T04:56:07.000+00:00
        name: example.com
        id: d290f1ee-6c54-4b01-90e6-d701748f0851
        status: STATUS_ACTIVE
        updatedAt: 2000-01-23T04:56:07.000+00:00
        workspaceId: d290f1ee-6c54-4b01-90e6-d701748f0851
      externalDocs:
        description: Learn more about branded links in Linkbreakers.
        url: https://linkbreakers.com/help/article/how-to-create-branded-links-in-linkbreakers
      properties:
        activatedAt:
          description: Timestamp when the domain became active after passing verification
            and certificate checks.
          format: date-time
          readOnly: true
          title: Timestamp when the domain was successfully set as active
          type: string
        createdAt:
          format: date-time
          readOnly: true
          title: Timestamp when the domain was created
          type: string
        id:
          example: d290f1ee-6c54-4b01-90e6-d701748f0851
          title: Unique identifier for the custom domain (UUID)
          type: string
        lastCheckedAt:
          format: date-time
          readOnly: true
          title: Timestamp of the last verification check
          type: string
        name:
          example: example.com
          title: The domain name
          type: string
        rootDestination:
          description: "URL where visitors are redirected when accessing your custom\
            \ domain without a path (e.g., qr.yourdomain.com). This redirect is not\
            \ tracked and serves purely for white-label purposes—preventing visitors\
            \ from seeing linkbreakers.com branding. If not specified, redirects to\
            \ linkbreakers.com by default."
          example: https://example.com
          title: Root destination URL
          type: string
        status:
          description: |-
            The status of a custom domain

             - STATUS_UNSPECIFIED: The status is not specified
             - STATUS_INACTIVE: The domain is inactive. It was created but not checked yet.
             - STATUS_DOMAIN_PENDING: The domain is pending. Last time it was checked, it was not pointing to the correct Linkbreakers subdomain.
             - STATUS_VERIFICATION_PENDING: The domain is pending verification. Please verify through TXT record.
             - STATUS_CERTIFICATE_PENDING: The domain is pending certificate. The SSL certificate is not yet ready.
             - STATUS_ACTIVE: The domain is fully active
          enum:
          - STATUS_UNSPECIFIED
          - STATUS_INACTIVE
          - STATUS_DOMAIN_PENDING
          - STATUS_VERIFICATION_PENDING
          - STATUS_CERTIFICATE_PENDING
          - STATUS_ACTIVE
          example: STATUS_ACTIVE
          type: string
        updatedAt:
          format: date-time
          readOnly: true
          title: Timestamp when the domain was last updated
          type: string
        workspaceId:
          example: d290f1ee-6c54-4b01-90e6-d701748f0851
          title: The ID of the workspace this domain belongs to (UUID)
          type: string
      title: Custom domain
    CustomDomainStatus:
      default: STATUS_UNSPECIFIED
      description: |-
        The status of a custom domain

         - STATUS_UNSPECIFIED: The status is not specified
         - STATUS_INACTIVE: The domain is inactive. It was created but not checked yet.
         - STATUS_DOMAIN_PENDING: The domain is pending. Last time it was checked, it was not pointing to the correct Linkbreakers subdomain.
         - STATUS_VERIFICATION_PENDING: The domain is pending verification. Please verify through TXT record.
         - STATUS_CERTIFICATE_PENDING: The domain is pending certificate. The SSL certificate is not yet ready.
         - STATUS_ACTIVE: The domain is fully active
      enum:
      - STATUS_UNSPECIFIED
      - STATUS_INACTIVE
      - STATUS_DOMAIN_PENDING
      - STATUS_VERIFICATION_PENDING
      - STATUS_CERTIFICATE_PENDING
      - STATUS_ACTIVE
      title: Status of a custom domain
      type: string
    CustomDomainsServiceUpdateBody:
      example:
        rootDestination: https://example.com
      properties:
        rootDestination:
          description: "URL where visitors are redirected when accessing your custom\
            \ domain without a path (e.g., qr.yourdomain.com). This redirect is not\
            \ tracked and serves purely for white-label purposes—preventing visitors\
            \ from seeing linkbreakers.com branding. Leave empty to redirect to linkbreakers.com\
            \ by default."
          example: https://example.com
          title: The root destination URL (optional)
          type: string
      title: Request to update a custom domain
    DataCollection:
      default: DATA_COLLECTION_UNSPECIFIED
      description: |-
        Defines how aggressively Linkbreakers prompts visitors for identifying data before allowing the workflow to continue.

         - DATA_COLLECTION_UNSPECIFIED: Data collection preference not specified
         - DATA_COLLECTION_NONE: No visitor data captured; Linkbreakers only logs the scan event.
         - DATA_COLLECTION_BASIC: Minimal data prompts (e.g., email) enabled to keep friction low while identifying high-signal visitors.
         - DATA_COLLECTION_ADVANCED: Full lead capture flows, including custom forms and required fields, before continuing the workflow.
      enum:
      - DATA_COLLECTION_UNSPECIFIED
      - DATA_COLLECTION_NONE
      - DATA_COLLECTION_BASIC
      - DATA_COLLECTION_ADVANCED
      title: DataCollection
      type: string
