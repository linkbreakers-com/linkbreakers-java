components:
  responses:
    "200":
      description: Everything worked as expected.
    "400":
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
      description: "The request was unacceptable, often due to missing a required\
        \ parameter."
    "401":
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
      description: No valid API key provided.
    "402":
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
      description: The parameters were valid but the request failed.
    "403":
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
      description: The API key doesn't have permissions to perform the request.
    "404":
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
      description: The requested resource doesn't exist.
    "409":
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
      description: The request conflicts with another request (perhaps due to using
        the same idempotent key).
    "429":
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
      description: Too many requests hit the API too quickly. We recommend an exponential
        backoff of your requests.
    "500":
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
      description: Something went wrong on the server end.
    "502":
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
      description: Something went wrong on the server end.
    "503":
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
      description: Something went wrong on the server end.
    "504":
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
      description: Something went wrong on the server end.
    default:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
      description: Unexpected error
  schemas:
    Action:
      default: ACTION_UNSPECIFIED
      description: |-
        - ACTION_UNSPECIFIED: Action not specified
         - ACTION_SCAN: QR code scan
         - ACTION_CLICK: First-time direct link click
      enum:
      - ACTION_UNSPECIFIED
      - ACTION_SCAN
      - ACTION_CLICK
      title: The type of event action
      type: string
    AddWorkflowStepRelationshipResponse:
      example:
        message: message
      properties:
        message:
          title: Confirmation message
          type: string
      title: Response for adding a workflow step relationship
    BackgroundOptions:
      properties:
        themeColor:
          allOf:
          - $ref: "#/components/schemas/ThemeColor"
          title: Color configuration supporting solid colors and gradients
      title: BackgroundOptions represents the styling options for the QR code background
    CanvasPosition:
      properties:
        x:
          format: double
          title: X coordinate on the canvas
          type: number
        "y":
          format: double
          title: Y coordinate on the canvas
          type: number
      title: Canvas position for React Flow node positioning
    CheckCustomDomainResponse:
      example:
        customDomain:
          createdAt: 2000-01-23T04:56:07.000+00:00
          lastCheckedAt: 2000-01-23T04:56:07.000+00:00
          rootDestination: https://example.com
          activatedAt: 2000-01-23T04:56:07.000+00:00
          name: example.com
          id: d290f1ee-6c54-4b01-90e6-d701748f0851
          status: STATUS_ACTIVE
          updatedAt: 2000-01-23T04:56:07.000+00:00
          workspaceId: d290f1ee-6c54-4b01-90e6-d701748f0851
      properties:
        customDomain:
          $ref: "#/components/schemas/CustomDomain"
      title: Response containing the status of a custom domain
    ClientRedirectPayload:
      properties:
        conversionTracking:
          example: true
          title: Controls whether lbid is preserved in redirect URL
          type: boolean
        destination:
          example: https://brand.example.com/checkout
          title: Fully qualified URL used for the redirect
          type: string
      title: Client redirect payload for EVENT_ACTION_CLIENT_REDIRECT
    ContactCardTraceCard:
      description: ContactCardTraceCard stores vCard metadata captured for contact
        cards.
      properties:
        buttonLabel:
          type: string
        city:
          type: string
        country:
          type: string
        email:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        organization:
          type: string
        phone:
          type: string
        postalCode:
          type: string
        state:
          type: string
